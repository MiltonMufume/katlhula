services:
  katlhula:
    image: katlhula
    container_name: katlhula-app
    ports:
      - "8080:8080"
    depends_on:
      - katlhula-db
  katlhula-db:
    image: mysql:8.0.40
    container_name: katlhula-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: M3lodic@1
      MYSQL_ALLOW_EMPTY_PASSWORD: no
      MYSQL_RANDOM_ROOT_PASSWORD: no
      MYSQL_DATABASE: katlhula_dev
  prometheus:
    image: prom/prometheus:v2.35.0
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./data/prometheus/config:/etc/prometheus/
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    ports:
      - "9090:9090"
  grafana:
    image: grafana/grafana-oss:8.5.2
    container_name: grafana
    restart: unless-stopped
    user: root
    ports:
      - 3000:3000
    links:
      - prometheus:prometheus
    volumes:
      - ./data/grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USER_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=localhost
      #Enabled for logging
      - GF_LOG_MODE=console file
      - GF_LOG_FILTERS=alerting.notifier.slack:debug alertmanager:debug ngalertdebug
